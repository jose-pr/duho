name: Docs

# Builds and deploys the documentation site independently of a release tag --
# manual dispatch (e.g. after fixing a docs-only issue without cutting a new
# release) or automatically when docs-affecting files land on main.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  docs-build:
    name: Build documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: actions/configure-pages@v5
      - name: Install package with docs tooling
        run: python -m pip install -e ".[dev,docs,colorama,config]"
      - name: Build docs
        run: mkdocs build --strict
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  docs-deploy:
    name: Deploy documentation to GitHub Pages
    needs: docs-build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
