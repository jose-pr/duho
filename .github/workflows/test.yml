name: Test

# On-demand / ad-hoc test workflow, kept separate from release.yml's own
# release-gate test job so it can be run without cutting a release. Two ways
# to trigger it:
#   - workflow_dispatch (optionally against a specific ref), for manual runs.
#   - push of a tag matching "ci-*" (throwaway tag, delete after) so an agent
#     without dashboard access can trigger + poll a run via the API/CLI.
# Not triggered by push/PR on branches by default -- add that only if the
# project actually wants CI on every commit.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test (branch, tag, or SHA)"
        required: false
        default: ""
  push:
    tags:
      - "ci-*"

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu full matrix over every supported version
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          # Windows/macOS matrix edges (oldest + newest supported)
          - os: windows-latest
            python-version: "3.9"
          - os: windows-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with all extras
        # Install every extra that has tests depending on it, or those tests
        # silently skip (pytest.importorskip) instead of actually running.
        run: python -m pip install -e ".[dev,colorama,config]"
      - name: Install shells for completion tests (Linux)
        # zsh/fish drive the T3 completion syntax-check tests; without them the
        # tests skipif-out instead of exercising the generated scripts. Linux
        # only -- the Windows/macOS legs skip these (shells not preinstalled).
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh fish
      - name: Run tests
        run: python -m pytest -q

  coverage:
    # Coverage gate on a single controlled Linux runner where the shell-driven
    # completion tests actually run (zsh/fish installed), so completion.py
    # coverage is real rather than skipped.
    name: Coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with all extras
        run: python -m pip install -e ".[dev,colorama,config]"
      - name: Install shells for completion tests
        run: sudo apt-get update && sudo apt-get install -y zsh fish
      - name: Run tests with coverage gate
        # Plan 03 target is >=92% overall; measured 93.66% after T1-T7, so the
        # gate is pinned at floor(measured)-1 = 92 (== the plan's post-T target;
        # raise as coverage grows). This is the correctness/coverage gate; the
        # benchmark job below is the separate Plan 02 perf gate -- don't conflate.
        run: python -m pytest -q --cov=duho --cov-fail-under=92

  benchmark:
    # Perf numbers for release notes come from here, not from a developer laptop.
    # Single fixed runner + interpreter so results stay comparable across runs.
    name: Benchmark (py${{ matrix.python-version }}, ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[dev,colorama,config]"
      - name: Run benchmarks
        run: python benchmarks/run.py --cold --save --json benchmarks/results/warm-py${{ matrix.python-version }}.json --name "duho-ci-py${{ matrix.python-version }}"
      - name: Fresh-process startup benchmarks
        run: python benchmarks/bench_startup.py -n 12 --json benchmarks/results/startup-py${{ matrix.python-version }}.json
      - name: Discovery benchmark
        run: python benchmarks/bench_discovery.py -n 5
      - name: Compare cold vs warm parser construction
        run: python benchmarks/compare_cache.py
      - name: Regression gate (vs committed baseline)
        # Fails only on a structural regression: >1.5x on warm-metric medians,
        # >1.3x on the startup deltas (which normalize out runner speed). A
        # Python version without a committed baseline entry is skipped, not
        # failed -- regenerate baselines with benchmarks/update_baseline.py.
        run: python benchmarks/check_baseline.py -n 12
      - name: Upload benchmark result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-py${{ matrix.python-version }}
          path: benchmarks/results/*.json

  docs:
    # The release workflow gates its Pages deploy on `mkdocs build --strict`.
    # Run the same check here so a docs break is caught before a tag is cut,
    # not halfway through an irreversible release.
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install package with docs tooling
        run: python -m pip install -e ".[dev,docs,colorama,config]"
      - name: Build docs
        run: mkdocs build --strict
